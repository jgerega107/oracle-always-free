services:
    seaweedfs:
        image: ghcr.io/seaweedfs/seaweedfs:latest
        container_name: tofu-state-seaweedfs
        command:
            - server
            - -ip=0.0.0.0
            - -dir=/data
            - -s3
            - -s3.port=8333
            - -s3.config=/etc/seaweedfs/s3.json
        ports:
            # S3-compatible API. Keep this private; expose over Tailscale/VPN instead
            # of the public internet.
            - "8333:8333"
            # Optional SeaweedFS master/filer UIs for local troubleshooting.
            - "9333:9333"
            - "8888:8888"
        volumes:
            - seaweedfs-data:/data
            - ./s3.json:/etc/seaweedfs/s3.json:ro
        restart: unless-stopped

volumes:
    seaweedfs-data:
